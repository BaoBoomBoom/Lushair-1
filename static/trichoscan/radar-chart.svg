<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆 -->
  <circle cx="150" cy="150" r="140" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" />
  
  <!-- 雷达图网格 -->
  <polygon points="150,30 270,150 150,270 30,150" fill="none" stroke="#e0e0e0" stroke-width="1" />
  <polygon points="150,60 240,150 150,240 60,150" fill="none" stroke="#e0e0e0" stroke-width="1" />
  <polygon points="150,90 210,150 150,210 90,150" fill="none" stroke="#e0e0e0" stroke-width="1" />
  <polygon points="150,120 180,150 150,180 120,150" fill="none" stroke="#e0e0e0" stroke-width="1" />
  
  <!-- 轴线 -->
  <line x1="150" y1="10" x2="150" y2="290" stroke="#e0e0e0" stroke-width="1" />
  <line x1="10" y1="150" x2="290" y2="150" stroke="#e0e0e0" stroke-width="1" />
  <line x1="45" y1="45" x2="255" y2="255" stroke="#e0e0e0" stroke-width="1" />
  <line x1="45" y1="255" x2="255" y2="45" stroke="#e0e0e0" stroke-width="1" />
  
  <!-- 数据区域 -->
  <polygon points="150,70 220,120 200,200 100,200 80,120" fill="#8b5cf680" stroke="#8b5cf6" stroke-width="2" />
  
  <!-- 数据点 -->
  <circle cx="150" cy="70" r="4" fill="#8b5cf6" />
  <circle cx="220" cy="120" r="4" fill="#8b5cf6" />
  <circle cx="200" cy="200" r="4" fill="#8b5cf6" />
  <circle cx="100" cy="200" r="4" fill="#8b5cf6" />
  <circle cx="80" cy="120" r="4" fill="#8b5cf6" />
  
  <!-- 轴标签 -->
  <text x="150" y="15" text-anchor="middle" font-size="12" fill="#666">Density</text>
  <text x="290" y="150" text-anchor="end" font-size="12" fill="#666">Volume</text>
  <text x="150" y="295" text-anchor="middle" font-size="12" fill="#666">Elasticity</text>
  <text x="10" y="150" text-anchor="start" font-size="12" fill="#666">Thickness</text>
  <text x="220" y="50" text-anchor="middle" font-size="12" fill="#666">Strength</text>
  <text x="80" y="50" text-anchor="middle" font-size="12" fill="#666">Health</text>
</svg> 