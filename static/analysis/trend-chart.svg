        fill="none" stroke="#10b981" stroke-width="2" />
  
  <!-- 紫色点 -->
  <circle cx="140" cy="60" r="3" fill="#8b5cf6" />
  <circle cx="200" cy="65" r="3" fill="#8b5cf6" />
  <circle cx="260" cy="45" r="3" fill="#8b5cf6" />
  
  <!-- 红色点 -->
  <circle cx="140" cy="75" r="3" fill="#f43f5e" />
  <circle cx="200" cy="65" r="3" fill="#f43f5e" />
  <circle cx="260" cy="70" r="3" fill="#f43f5e" />
  
  <!-- 绿色点 -->
  <circle cx="140" cy="50" r="3" fill="#10b981" />
  <circle cx="200" cy="55" r="3" fill="#10b981" />
  <circle cx="260" cy="50" r="3" fill="#10b981" />
</svg> 