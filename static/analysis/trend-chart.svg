<svg width="100%" height="100%" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 坐标轴 -->
  <line x1="10" y1="100" x2="310" y2="100" stroke="#e5e5e5" stroke-width="1"/>
  
  <!-- 紫色线条 (头发损失) -->
  <path d="M20,70 C40,65 60,60 80,55 C100,50 120,48 140,60 C160,72 180,75 200,65 C220,55 240,50 260,45 C280,40 300,35 320,30" 
        fill="none" stroke="#8b5cf6" stroke-width="2" />
  
  <!-- 红色线条 (头皮油脂) -->
  <path d="M20,80 C40,70 60,60 80,70 C100,80 120,85 140,75 C160,65 180,60 200,65 C220,70 240,75 260,70 C280,65 300,60 320,55" 
        fill="none" stroke="#f43f5e" stroke-width="2" />
  
  <!-- 绿色线条 (头皮敏感度) -->
