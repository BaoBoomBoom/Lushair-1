<svg width="100%" height="220" viewBox="0 0 240 220" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- 背景网格 -->
  <circle cx="120" cy="110" r="100" fill="none" stroke="#eee" stroke-width="1"/>
  <circle cx="120" cy="110" r="75" fill="none" stroke="#eee" stroke-width="1"/>
  <circle cx="120" cy="110" r="50" fill="none" stroke="#eee" stroke-width="1"/>
  <circle cx="120" cy="110" r="25" fill="none" stroke="#eee" stroke-width="1"/>
  
  <!-- 六边形轴线 -->
  <line x1="120" y1="10" x2="120" y2="210" stroke="#eee" stroke-width="1"/>
  <line x1="20" y1="60" x2="220" y2="160" stroke="#eee" stroke-width="1"/>
  <line x1="20" y1="160" x2="220" y2="60" stroke="#eee" stroke-width="1"/>
  
  <!-- 轴标签 -->
  <text x="120" y="5" text-anchor="middle" font-size="12" fill="#666">Hair</text>
  <text x="230" y="60" text-anchor="start" font-size="12" fill="#666">Follicle</text>
  <text x="230" y="170" text-anchor="start" font-size="12" fill="#666">Oiliness</text>
  <text x="120" y="220" text-anchor="middle" font-size="12" fill="#666">Sensitivity</text>
  <text x="10" y="170" text-anchor="end" font-size="12" fill="#666">Gray Hair</text>
  <text x="10" y="60" text-anchor="end" font-size="12" fill="#666">Scurf</text>
  
  <!-- 数据多边形 -->
  <polygon points="120,30 170,76 150,170 90,170 70,76" 
           fill="url(#purpleGradient)" stroke="#8b5cf6" stroke-width="2"/>
  
  <!-- 数据点 -->
  <circle cx="120" cy="30" r="4" fill="#8b5cf6"/>
  <circle cx="170" cy="76" r="4" fill="#8b5cf6"/>
  <circle cx="150" cy="170" r="4" fill="#8b5cf6"/>
  <circle cx="90" cy="170" r="4" fill="#8b5cf6"/>
  <circle cx="70" cy="76" r="4" fill="#8b5cf6"/>
</svg> 